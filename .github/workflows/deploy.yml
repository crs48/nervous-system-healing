name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro build
      # Link-integrity gate (0003): serve the built output and crawl it, so
      # internal links resolve under the base path. Outbound directory links are
      # skipped (rate-limited / bot-blocked); each entry keeps a Wayback snapshot.
      - name: Check links
        run: |
          npx astro preview --port 4455 &
          npx wait-on http://localhost:4455/nervous-system-healing/ --timeout 60000
          npx linkinator http://localhost:4455/nervous-system-healing/ --recurse \
            --skip "^https?://(?!localhost)" --timeout 30000
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
