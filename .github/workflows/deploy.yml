name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro build
      # Link-integrity gate (0003): internal links resolve under the base path;
      # archive.org is skipped (rate-limited) — outbound snapshots exist per-entry.
      - name: Check links
        run: |
          mkdir -p _site/nervous-system-healing
          cp -r dist/* _site/nervous-system-healing/
          npx linkinator _site/nervous-system-healing --server-root _site --recurse \
            --skip "web.archive.org" --timeout 30000
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
